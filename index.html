<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄影派 - 高保真原型展示</title>
    <script src="lib/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="lib/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .screens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .screen-wrapper {
            background: white;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .screen-wrapper:hover {
            transform: translateY(-5px);
        }

        .screen-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding: 8px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .phone-frame {
            width: 320px;
            height: 680px;
            background: #000;
            border-radius: 45px;
            padding: 12px;
            box-shadow: inset 0 0 0 2px #333;
            position: relative;
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 25px;
            background: #000;
            border-radius: 15px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: #f5f5f5;
            border-radius: 35px;
            overflow: hidden;
            position: relative;
        }

        .phone-screen iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 35px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 40px 0 20px 0;
            padding: 15px 25px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            max-width: 1800px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
