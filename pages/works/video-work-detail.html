<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频作品详情</title>
    <script src="../../lib/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="../../lib/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: white;
            z-index: 10;
        }
        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }
        .play-btn {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn i {
            color: white;
            font-size: 32px;
            margin-left: 6px;
        }
        .user-info-overlay {
            position: absolute;
            bottom: 80px;
            left: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info-overlay img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .user-info-overlay .username {
            color: white;
            font-weight: 600;
            font-size: 15px;
        }
        .action-overlay {
            position: absolute;
            bottom: 80px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        .action-item i {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .action-item span {
            font-size: 12px;
        }
        .comment-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            padding-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .comment-input {
            flex: 1;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
        }
        .comment-input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        .danmu-list {
            position: absolute;
            bottom: 140px;
            left: 0;
            right: 0;
            padding: 0 16px;
            pointer-events: none;
        }
        .danmu-item {
            color: white;
            font-size: 14px;
            margin-bottom: 8px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <span>9:41</span>
        <div class="flex items-center gap-1">
            <i class="fas fa-signal text-xs"></i>
            <i class="fas fa-wifi text-xs"></i>
            <i class="fas fa-battery-full text-xs"></i>
        </div>
    </div>

    <!-- 视频播放区域 -->
    <div class="video-container">
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800" alt="视频封面">
        <div class="play-btn">
            <i class="fas fa-play"></i>
        </div>

        <!-- 用户信息 -->
        <div class="user-info-overlay">
            <img src="https://i.pravatar.cc/40?img=2" alt="头像">
            <div class="username">自然摄影师</div>
        </div>

        <!-- 右侧操作按钮 -->
        <div class="action-overlay">
            <div class="action-item">
                <i class="fas fa-heart"></i>
                <span>2.5k</span>
            </div>
            <div class="action-item">
                <i class="fas fa-comment-dots"></i>
                <span>132</span>
            </div>
            <div class="action-item">
                <i class="fas fa-star"></i>
                <span>收藏</span>
            </div>
            <div class="action-item">
                <i class="fas fa-share"></i>
                <span>分享</span>
            </div>
        </div>

        <!-- 弹幕列表 -->
        <div class="danmu-list">
            <div class="danmu-item">用户A: 太美了!🌲</div>
            <div class="danmu-item">用户B: 这是哪里啊?</div>
            <div class="danmu-item">用户C: 拍摄技术太棒了!</div>
            <div class="danmu-item">用户D: 想去这里打卡~</div>
        </div>

        <!-- 评论栏 -->
        <div class="comment-bar">
            <input type="text" class="comment-input" placeholder="发送弹幕...">
            <i class="fas fa-at text-white text-xl"></i>
            <i class="fas fa-gift text-white text-xl"></i>
        </div>
    </div>
</body>
</html>
