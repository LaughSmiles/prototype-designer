    <title>作品</title>
    <script src="../../lib/js/tailwindcss.js"></script>
    <link rel="stylesheet" href="../../lib/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            padding-bottom: 80px;
        }
        .status-bar {
            background: white;
            padding: 12px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        .nav-tabs {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .nav-tab {
            font-size: 16px;
            color: #666;
            font-weight: 500;
            padding-bottom: 8px;
            position: relative;
        }
        .nav-tab.active {
            color: #333;
            font-weight: 600;
        }
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #FF2442;
            border-radius: 2px;
        }
        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 12px;
        }
        .work-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .work-item img {
            width: 100%;
            display: block;
        }
        .work-info {
            padding: 10px 12px;
        }
        .work-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .work-author {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .work-author img {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }
        .work-author span {
            font-size: 12px;
            color: #999;
        }
        .work-stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 8px 0 20px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            color: #999;
        }
        .tab-item.active {
            color: #007AFF;
        }
        .tab-item i {
            font-size: 22px;
            margin-bottom: 2px;
        }
    </style>
</head>
